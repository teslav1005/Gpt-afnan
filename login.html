<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مصر الذكيه - تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-auth.js"></script>
    <style>
        :root { --app-bg: #050505; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Cairo', sans-serif; 
            background: linear-gradient(135deg, #050505 0%, #1a1a2e 50%, #16213e 100%);
            color: #fff; 
            overflow: hidden;
            min-height: 100dvh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .glassmorphic-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 24px;
            padding: 40px 30px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            animation: slideUp 0.6s ease-out;
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .logo-section {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin: 0 auto 16px;
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.3);
        }
        .logo-text {
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #00d4ff 0%, #0099ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 1px;
        }
        .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            margin-top: 8px;
            text-align: center;
        }
        .auth-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 24px;
        }
        .auth-btn {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: 'Cairo', sans-serif;
        }
        .auth-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 212, 255, 0.2);
        }
        .auth-btn:active {
            transform: translateY(0);
        }
        .auth-btn i {
            font-size: 18px;
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 20px 0;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.4);
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
        }
        .loading-spinner {
            display: none;
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: #00d4ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .error-message {
            display: none;
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: #fca5a5;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 16px;
            text-align: center;
        }
        .success-message {
            display: none;
            background: rgba(34, 197, 94, 0.1);
            border: 1px solid rgba(34, 197, 94, 0.3);
            color: #86efac;
            padding: 12px;
            border-radius: 8px;
            font-size: 12px;
            margin-bottom: 16px;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="login-container">
    <div class="glassmorphic-card">
        <div class="logo-section">
            <div class="logo-icon"><i class="fa-solid fa-sparkles"></i></div>
            <div class="logo-text">مصر الذكيه</div>
            <div class="subtitle">استوديو الذكاء الاصطناعي</div>
        </div>

        <div class="error-message" id="errorMessage"></div>
        <div class="success-message" id="successMessage"></div>
        <div class="loading-spinner" id="loadingSpinner"></div>

        <div class="auth-buttons">
            <button class="auth-btn" id="googleBtn" onclick="signInWithGoogle()">
                <i class="fa-brands fa-google"></i>
                <span>تسجيل الدخول عبر جوجل</span>
            </button>
            <button class="auth-btn" id="twitterBtn" onclick="signInWithTwitter()">
                <i class="fa-brands fa-x-twitter"></i>
                <span>تسجيل الدخول عبر إكس</span>
            </button>
        </div>

        <div class="divider">أو</div>

        <p style="font-size: 12px; color: rgba(255, 255, 255, 0.5); text-align: center; line-height: 1.6;">
            بتسجيلك الدخول، أنت توافق على شروط الخدمة وسياسة الخصوصية الخاصة بنا.
        </p>
    </div>
</div>

<script>
    // Firebase Configuration
    const firebaseConfig = {
        apiKey: "AIzaSyBA3w0gv38P6Ry_m3sMwXI-l-_NGuWKCUA",
        authDomain: "flow-afnan.firebaseapp.com",
        databaseURL: "https://flow-afnan-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "flow-afnan",
        storageBucket: "flow-afnan.firebasestorage.app",
        messagingSenderId: "730735289702",
        appId: "1:730735289702:web:5b21d8fa380cb09e0f54a7",
        measurementId: "G-90ZX8YBJ6D"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    // Check if user is already logged in
    auth.onAuthStateChanged((user) => {
        if (user) {
            localStorage.setItem('gpt_afnan_user', JSON.stringify({
                uid: user.uid,
                email: user.email,
                displayName: user.displayName,
                photoURL: user.photoURL,
                loginTime: Date.now()
            }));
            window.location.href = 'chat.html';
        }
    });

    function showError(message) {
        const errorEl = document.getElementById('errorMessage');
        errorEl.textContent = message;
        errorEl.style.display = 'block';
        setTimeout(() => errorEl.style.display = 'none', 5000);
    }

    function showSuccess(message) {
        const successEl = document.getElementById('successMessage');
        successEl.textContent = message;
        successEl.style.display = 'block';
        setTimeout(() => successEl.style.display = 'none', 3000);
    }

    function toggleLoading(show) {
        document.getElementById('loadingSpinner').style.display = show ? 'block' : 'none';
        document.getElementById('googleBtn').disabled = show;
        document.getElementById('twitterBtn').disabled = show;
    }

    async function signInWithGoogle() {
        toggleLoading(true);
        try {
            const provider = new firebase.auth.GoogleAuthProvider();
            provider.setCustomParameters({ prompt: 'select_account' });
            const result = await auth.signInWithPopup(provider);
            showSuccess('تم تسجيل الدخول بنجاح!');
        } catch (error) {
            toggleLoading(false);
            if (error.code === 'auth/popup-closed-by-user') {
                showError('تم إغلاق نافذة تسجيل الدخول');
            } else if (error.code === 'auth/cancelled-popup-request') {
                showError('تم إلغاء طلب تسجيل الدخول');
            } else {
                showError('حدث خطأ: ' + error.message);
            }
        }
    }

    async function signInWithTwitter() {
        toggleLoading(true);
        try {
            const provider = new firebase.auth.TwitterAuthProvider();
            const result = await auth.signInWithPopup(provider);
            showSuccess('تم تسجيل الدخول بنجاح!');
        } catch (error) {
            toggleLoading(false);
            if (error.code === 'auth/popup-closed-by-user') {
                showError('تم إغلاق نافذة تسجيل الدخول');
            } else if (error.code === 'auth/cancelled-popup-request') {
                showError('تم إلغاء طلب تسجيل الدخول');
            } else {
                showError('حدث خطأ: ' + error.message);
            }
        }
    }
</script>
</body>
</html>
