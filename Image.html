<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مصر الذكيه - استوديو التوليد الفاخر</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --app-bg: #050505; --sheet-bg: #121214; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--app-bg); color: #fff; margin: 0; padding: 0; overflow: hidden; }
        .app-container { width: 100%; height: 100dvh; background-color: var(--app-bg); display: flex; flex-direction: column; position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #workspaceArea { flex: 1; overflow-y: auto; padding-bottom: clamp(150px, 20vw, 280px); }
        #floatingBottomSheet { position: absolute; bottom: clamp(5px, 2vw, 15px); left: clamp(5px, 2vw, 15px); right: clamp(5px, 2vw, 15px); background-color: var(--sheet-bg); border-radius: clamp(16px, 4vw, 28px); padding: clamp(8px, 2vw, 15px); box-shadow: 0 20px 50px rgba(0,0,0,0.9); z-index: 40; transition: all 0.4s; }
        #optionsArea.collapsed { max-height: 0; opacity: 0; overflow: hidden; margin: 0; }
        textarea { resize: none; min-height: 24px; max-height: 100px; font-size: clamp(12px, 2vw, 16px); }
        .image-slot { width: clamp(40px, 10vw, 70px); height: clamp(40px, 10vw, 70px); border: 1px dashed #3f3f46; border-radius: 12px; display: flex; align-items: center; justify-content: center; background-color: #18181b; flex-shrink: 0; background-size: cover; background-position: center; cursor: pointer; position: relative; }
        .image-slot.has-image { border-style: solid; border-color: #71717a; }
        .remove-img { position: absolute; -top: 5px; -right: 5px; background: #ef4444; color: white; border-radius: 50%; width: 16px; height: 16px; display: flex; align-items: center; justify-content: center; font-size: 10px; cursor: pointer; }
        #modelSelectModal.active { opacity: 1; pointer-events: auto; }
        #modelSelectContent { transition: transform 0.3s; transform: translateY(100%); }
        #modelSelectModal.active #modelSelectContent { transform: translateY(0); }
    </style>
</head>
<body>
<div class="app-container">
    <header class="flex justify-between items-center p-3 md:p-4 z-20 backdrop-blur-md bg-black/40 sticky top-0 border-b border-white/5">
        <a href="chat.html" class="text-white w-8 md:w-9 h-8 md:h-9 flex items-center justify-center bg-zinc-900 rounded-full"><i class="fa-solid fa-arrow-right text-xs md:text-sm"></i></a>
        <h1 class="text-sm md:text-base font-bold">مصر الذكيه <span class="text-[8px] md:text-[9px] bg-white text-black px-1.5 py-0.5 rounded-full font-extrabold">IMAGE</span></h1>
        <button id="newChatBtn" class="text-white px-2 md:px-3 py-1.5 bg-white/10 border border-white/20 rounded-full text-xs font-bold flex items-center gap-1"><i class="fa-solid fa-plus-circle text-xs"></i> <span class="hidden sm:inline">جديد</span></button>
    </header>

    <main id="workspaceArea" class="p-3 md:p-4 no-scrollbar">
        <div id="inspirationSection" class="space-y-3 md:space-y-4">
            <span class="text-xs font-bold text-gray-400"><i class="fa-solid fa-sparkles text-white ml-1"></i> فكرة ملهمة لتبدأ بها</span>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3 md:gap-4">
                <img src="https://gen.pollinations.ai/image/cyberpunk%20egyptian%20pharaoh?model=flux" class="rounded-xl border border-white/5 w-full h-auto">
                <img src="https://gen.pollinations.ai/image/ancient%20cairo%20futuristic?model=flux" class="rounded-xl border border-white/5 w-full h-auto">
            </div>
        </div>
        <div id="chatSection" class="hidden space-y-4">
            <div class="bg-zinc-800 p-3 md:p-4 rounded-2xl rounded-tr-none text-xs md:text-sm max-w-full md:max-w-[85%]"><p id="submittedPromptText" class="font-semibold"></p></div>
            <div id="resultsContainer" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                <!-- Generated images will appear here -->
            </div>
        </div>
    </main>

    <div id="floatingBottomSheet">
        <div class="flex flex-col gap-2 mb-2 px-1">
            <div class="flex items-center justify-between">
                <span class="text-[10px] text-gray-400 font-bold"><i class="fa-solid fa-paperclip ml-1"></i> الصور المرفقة (بحد أقصى 3)</span>
                <span id="imgCounter" class="text-[10px] text-gray-500">0/3</span>
            </div>
            <div class="flex gap-2 overflow-x-auto no-scrollbar" id="imageSlotsContainer">
                <div class="image-slot" onclick="triggerUpload(0)"><i class="fa-solid fa-plus text-gray-600"></i><input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(event, 0)"></div>
                <div class="image-slot" onclick="triggerUpload(1)"><i class="fa-solid fa-plus text-gray-600"></i><input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(event, 1)"></div>
                <div class="image-slot" onclick="triggerUpload(2)"><i class="fa-solid fa-plus text-gray-600"></i><input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(event, 2)"></div>
            </div>
        </div>

        <div class="flex items-end gap-2 bg-[#1C1C1E] p-1.5 pl-2 rounded-full border border-gray-700/50 focus-within:border-gray-500">
            <button id="toggleSettingsBtn" class="w-8 md:w-9 h-8 md:h-9 flex items-center justify-center text-gray-400 bg-gray-800/40 rounded-full flex-shrink-0"><i class="fa-solid fa-sliders text-xs md:text-sm"></i></button>
            <textarea id="promptInput" rows="1" class="bg-transparent w-full outline-none text-xs md:text-sm py-2 text-white" placeholder="صف الصورة التي تريدها..."></textarea>
            <button id="sendBtn" class="bg-white text-black rounded-full w-8 md:w-9 h-8 md:h-9 flex-shrink-0 flex items-center justify-center opacity-40 pointer-events-none"><i class="fa-solid fa-paper-plane text-xs md:text-sm"></i></button>
        </div>
        
        <div id="optionsArea" class="collapsed mt-3 flex flex-col gap-3 px-1">
            <div class="flex flex-col md:flex-row gap-2">
                <button id="openModelSelect" class="flex-1 bg-gray-800/40 border border-gray-700 rounded-xl p-2 md:p-2.5 flex flex-col items-start">
                    <span class="text-[9px] text-gray-500 font-bold">النموذج</span>
                    <span id="selectedModelLabel" class="font-bold text-xs md:text-sm">flux</span>
                </button>
                <div id="ratioContainer" class="flex-1 bg-gray-800/40 border border-gray-700 rounded-xl p-2 flex items-center gap-1 overflow-x-auto no-scrollbar"></div>
            </div>
            
            <div class="flex flex-col gap-1.5">
                <span class="text-[9px] text-gray-500 font-bold px-1">عدد الصور</span>
                <div id="countContainer" class="flex bg-gray-800/40 border border-gray-700 rounded-xl p-1 gap-1 overflow-x-auto md:overflow-x-visible no-scrollbar">
                    <button class="count-btn flex-1 py-1.5 rounded-lg text-xs font-bold bg-white text-black" data-count="1">1x</button>
                    <button class="count-btn flex-1 py-1.5 rounded-lg text-xs font-bold text-gray-400" data-count="2">2x</button>
                    <button class="count-btn flex-1 py-1.5 rounded-lg text-xs font-bold text-gray-400" data-count="3">3x</button>
                    <button class="count-btn flex-1 py-1.5 rounded-lg text-xs font-bold text-gray-400" data-count="4">4x</button>
                </div>
            </div>

            <button id="closeOptionsBtn" class="w-full py-1.5 text-gray-500 bg-zinc-900 rounded-lg text-xs md:text-sm"><i class="fa-solid fa-chevron-down text-xs"></i> إخفاء الإعدادات</button>
        </div>
    </div>
</div>

<div id="modelSelectModal" class="fixed inset-0 bg-black/60 z-50 opacity-0 pointer-events-none backdrop-blur-sm transition-opacity">
    <div class="absolute inset-0" id="modalBackdrop"></div>
    <div id="modelSelectContent" class="absolute bottom-0 left-0 right-0 bg-[#161618] p-4 md:p-6 rounded-t-[32px] border-t border-gray-800 max-h-[80vh] overflow-y-auto">
        <h3 class="font-bold text-xs md:text-sm mb-4 text-center text-gray-300">نماذج توليد الصور</h3>
        <div class="space-y-2">
            <div class="model-item p-3 md:p-4 bg-zinc-900 rounded-xl cursor-pointer flex justify-between items-center" data-model="flux">
                <span class="font-bold text-xs md:text-sm text-white">flux</span>
                <i class="fa-solid fa-bolt text-amber-500 text-xs"></i>
            </div>
            <div class="model-item p-3 md:p-4 bg-zinc-900 rounded-xl cursor-pointer flex justify-between items-center" data-model="gpt-image-2">
                <span class="font-bold text-xs md:text-sm text-white">gpt-image-2</span>
                <i class="fa-solid fa-brain text-blue-500 text-xs"></i>
            </div>
            <div class="model-item p-3 md:p-4 bg-zinc-900 rounded-xl cursor-pointer flex justify-between items-center" data-model="nanobanana-2">
                <span class="font-bold text-xs md:text-sm text-white">nanobanana-2</span>
                <i class="fa-solid fa-wand-magic-sparkles text-purple-500 text-xs"></i>
            </div>
        </div>
    </div>
</div>

<script>
    let selectedModel = "flux";
    let selectedRatio = "1:1";
    let selectedCount = 1;
    let attachedImages = [null, null, null];
    const ratios = ["1:1", "16:9", "9:16", "4:3", "3:4"];

    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const optionsArea = document.getElementById('optionsArea');
    const resultsContainer = document.getElementById('resultsContainer');

    // UI Toggle
    document.getElementById('toggleSettingsBtn').onclick = () => optionsArea.classList.toggle('collapsed');
    document.getElementById('closeOptionsBtn').onclick = () => optionsArea.classList.add('collapsed');
    document.getElementById('openModelSelect').onclick = () => document.getElementById('modelSelectModal').classList.add('active');
    document.getElementById('modalBackdrop').onclick = () => document.getElementById('modelSelectModal').classList.remove('active');

    // Model Selection
    document.querySelectorAll('.model-item').forEach(m => {
        m.onclick = () => {
            selectedModel = m.dataset.model;
            document.getElementById('selectedModelLabel').textContent = selectedModel;
            document.getElementById('modelSelectModal').classList.remove('active');
        };
    });

    // Ratio Selection
    const ratioContainer = document.getElementById('ratioContainer');
    ratios.forEach(r => {
        const btn = document.createElement('button');
        btn.className = `px-2 py-1 rounded text-[10px] whitespace-nowrap font-bold ${r === selectedRatio ? 'bg-white text-black' : 'text-gray-400'}`;
        btn.textContent = r;
        btn.onclick = () => {
            selectedRatio = r;
            Array.from(ratioContainer.children).forEach(b => b.className = `px-2 py-1 rounded text-[10px] whitespace-nowrap font-bold text-gray-400`);
            btn.className = `px-2 py-1 rounded text-[10px] whitespace-nowrap font-bold bg-white text-black`;
        };
        ratioContainer.appendChild(btn);
    });

    // Count Selection
    document.querySelectorAll('.count-btn').forEach(btn => {
        btn.onclick = () => {
            selectedCount = parseInt(btn.dataset.count);
            document.querySelectorAll('.count-btn').forEach(b => {
                b.classList.remove('bg-white', 'text-black');
                b.classList.add('text-gray-400');
            });
            btn.classList.add('bg-white', 'text-black');
            btn.classList.remove('text-gray-400');
        };
    });

    // Image Upload Handling
    function triggerUpload(index) {
        if (attachedImages[index]) {
            removeImage(index);
        } else {
            document.querySelectorAll('.image-slot input')[index].click();
        }
    }

    function handleImageUpload(event, index) {
        const file = event.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                attachedImages[index] = e.target.result;
                const slot = document.querySelectorAll('.image-slot')[index];
                slot.style.backgroundImage = `url(${e.target.result})`;
                slot.classList.add('has-image');
                slot.innerHTML = '<div class="remove-img" onclick="event.stopPropagation(); removeImage(' + index + ')"><i class="fa-solid fa-xmark"></i></div>';
                updateCounter();
            };
            reader.readAsDataURL(file);
        }
    }

    function removeImage(index) {
        attachedImages[index] = null;
        const slot = document.querySelectorAll('.image-slot')[index];
        slot.style.backgroundImage = 'none';
        slot.classList.remove('has-image');
        slot.innerHTML = '<i class="fa-solid fa-plus text-gray-600"></i><input type="file" class="hidden" accept="image/*" onchange="handleImageUpload(event, ' + index + ')">';
        updateCounter();
    }

    function updateCounter() {
        const count = attachedImages.filter(img => img !== null).length;
        document.getElementById('imgCounter').textContent = `${count}/3`;
    }

    promptInput.oninput = () => {
        if (promptInput.value.trim()) sendBtn.classList.remove('opacity-40', 'pointer-events-none');
        else sendBtn.classList.add('opacity-40', 'pointer-events-none');
    };

    sendBtn.onclick = async () => {
        const prompt = promptInput.value.trim();
        document.getElementById('inspirationSection').classList.add('hidden');
        document.getElementById('chatSection').classList.remove('hidden');
        document.getElementById('submittedPromptText').textContent = prompt;
        optionsArea.classList.add('collapsed');
        
        resultsContainer.innerHTML = '';
        
        // Create skeleton loaders for the requested count
        for (let i = 0; i < selectedCount; i++) {
            const card = document.createElement('div');
            card.className = "bg-zinc-900 border border-zinc-800 p-3 md:p-4 rounded-2xl rounded-tl-none w-full space-y-3";
            card.innerHTML = `
                <div class="w-full rounded-xl bg-black aspect-square flex flex-col items-center justify-center relative overflow-hidden">
                    <div class="loader flex flex-col items-center"><i class="fa-solid fa-spinner fa-spin text-2xl mb-2"></i><p class="text-xs md:text-sm">جاري التوليد ${selectedCount > 1 ? (i+1) : ''}...</p></div>
                    <img class="hidden w-full h-full object-contain result-img">
                </div>
                <div class="success-actions hidden flex justify-center"><button class="bg-white text-black px-3 md:px-4 py-2 rounded-lg text-xs md:text-sm font-bold download-btn">تحميل الصورة</button></div>
            `;
            resultsContainer.appendChild(card);
        }

        // Save to history
        const history = JSON.parse(localStorage.getItem('gpt_afnan_image_history') || '[]');
        history.unshift({
            id: Date.now(),
            prompt: prompt,
            model: selectedModel,
            timestamp: new Date().toLocaleString('ar-EG')
        });
        localStorage.setItem('gpt_afnan_image_history', JSON.stringify(history.slice(0, 50)));

        try {
            const validImages = attachedImages.filter(img => img !== null);
            const res = await fetch('/api/image', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    prompt, 
                    model: selectedModel, 
                    size: selectedRatio, 
                    n: selectedCount,
                    images: validImages
                })
            });
            const data = await res.json();
            
            if (data.success) {
                const imgElements = document.querySelectorAll('.result-img');
                const loaders = document.querySelectorAll('.loader');
                const actions = document.querySelectorAll('.success-actions');
                const downloadBtns = document.querySelectorAll('.download-btn');

                imgElements.forEach((img, idx) => {
                    const url = data.imageUrls ? data.imageUrls[idx] : data.imageUrl;
                    img.src = url + (selectedCount > 1 ? `&seed=${Math.random()}` : ''); 
                    img.onload = () => {
                        loaders[idx].classList.add('hidden');
                        img.classList.remove('hidden');
                        actions[idx].classList.remove('hidden');
                        downloadBtns[idx].onclick = () => window.open(img.src, '_blank');
                    };
                });
            }
        } catch (e) {
            alert("خطأ في توليد الصورة");
        }
    };

    document.getElementById('newChatBtn').onclick = () => location.reload();
</script>
</body>
</html>
