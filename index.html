<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Afnan AI - منصة الدردشة الذكية</title>
    <link rel="stylesheet" href="assets/css/tailwind.css">
    <link rel="stylesheet" href="assets/css/fontawesome.css">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="app.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.7);
            --glass-border: rgba(255, 255, 255, 0.3);
            --user-msg-bg: #F4F4F4;
            --bot-msg-bg: #FFFFFF;
        }
        .glass { backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); background: var(--glass-bg); border: 1px solid var(--glass-border); }
        .sidebar-transition { transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
        .animate-pop { animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes popIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .msg-user { align-self: flex-end; }
        .msg-bot { align-self: flex-start; }
    </style>
</head>
<body class="antialiased text-gray-900 bg-white flex h-screen overflow-hidden">

    <div id="overlay" class="fixed inset-0 bg-black/10 backdrop-blur-[2px] hidden transition-opacity duration-300 opacity-0" style="z-index: 100;"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed md:static inset-y-0 left-0 w-72 bg-[#fcfcfc] border-r border-gray-100 flex flex-col transform -translate-x-full md:translate-x-0 sidebar-transition h-full z-[150]">
        <div class="p-4 flex flex-col gap-4">
            <button id="newChatBtn" class="flex items-center gap-3 w-full bg-white border border-gray-100 p-3.5 rounded-2xl hover:bg-gray-50 transition-all shadow-sm active:scale-95">
                <img src="assets/img/logo.jpg" alt="Logo" class="w-5 h-5">
                <span class="font-bold text-gray-700 text-sm">محادثة جديدة</span>
            </button>
            <div class="relative">
                <i class="fa-solid fa-magnifying-glass absolute right-3 top-1/2 -translate-y-1/2 text-gray-400 text-xs"></i>
                <input type="text" id="historySearch" placeholder="بحث في المحادثات..." class="w-full bg-gray-100 border-none rounded-xl py-2 pr-9 pl-3 text-xs focus:ring-1 focus:ring-gray-200">
            </div>
        </div>
        
        <div class="flex-1 overflow-y-auto px-4 space-y-4 hide-scrollbar" id="historyList">
            <div id="recentSection" class="space-y-1">
                <p class="text-[10px] font-bold text-gray-400 px-2 mb-2">الأخيرة</p>
                <div id="recentList" class="space-y-1"></div>
            </div>
        </div>

        <div class="p-4 border-t border-gray-100 space-y-1 relative" id="profileSection"></div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col min-w-0 h-full relative">
        <header class="h-[64px] flex items-center justify-between px-6 border-b border-gray-50 bg-white/80 backdrop-blur-md shrink-0 relative">
            <div class="flex items-center gap-4">
                <button id="sidebarToggle" class="flex flex-col gap-1.5 p-1 md:hidden">
                    <span class="w-6 h-0.5 bg-gray-600 rounded-full"></span>
                    <span class="w-4 h-0.5 bg-gray-600 rounded-full"></span>
                </button>
            </div>

            <div id="modelSelectorTop" class="hidden relative">
                <button id="currentModelBtn" class="glass px-4 py-2 rounded-full text-xs font-bold flex items-center gap-2 hover:bg-white/90 transition-all">
                    <span id="activeModelName">Afnan-Fishe</span>
                    <i class="fa-solid fa-chevron-down text-[10px] text-gray-400"></i>
                </button>
                <div id="modelDropdown" class="glass absolute top-full left-0 mt-2 w-48 rounded-2xl shadow-xl hidden animate-pop overflow-hidden z-[1000]">
                    <div class="p-1.5 space-y-0.5">
                        <div onclick="selectModel('Afnan-Fishe')" class="p-3 hover:bg-white/50 rounded-xl cursor-pointer flex items-center justify-between transition-all">
                            <span class="text-xs font-bold">Afnan-Fishe</span>
                            <i class="fa-solid fa-fish text-blue-500 text-[10px]"></i>
                        </div>
                        <div onclick="selectModel('Afnan-Pro')" class="p-3 hover:bg-white/50 rounded-xl cursor-pointer flex items-center justify-between transition-all">
                            <span class="text-xs font-bold">Afnan-Pro</span>
                            <i class="fa-solid fa-star text-purple-500 text-[10px]"></i>
                        </div>
                    </div>
                </div>
            </div>

            <div id="authButtons">
                <button id="loginBtnHeader" onclick="location.href='login.html'" class="bg-black text-white px-6 py-2 rounded-full text-sm font-bold hover:bg-gray-800 transition-all">تسجيل الدخول</button>
            </div>
        </header>

        <div id="chatWindow" class="flex-1 overflow-y-auto hide-scrollbar scroll-smooth bg-white">
            <div id="emptyView" class="min-h-full flex flex-col items-center justify-center text-center p-12 opacity-30 select-none">
                <img src="assets/img/logo.jpg" class="w-20 h-20 mb-4 grayscale" alt="Logo">
                <h2 class="text-2xl font-bold">Afnan ai</h2>
            </div>
            <div id="messageBox" class="max-w-4xl mx-auto p-4 md:p-8 flex flex-col gap-8"></div>
        </div>

        <div class="w-full bg-white p-4 md:p-8 pt-5 shrink-0 safe-pb">
            <div class="max-w-3xl mx-auto relative">
                <div id="inputContainer" class="bg-white border border-gray-200 rounded-[2.2rem] flex flex-col shadow-lg relative">
                    <div id="attachmentPreview" class="px-4 pt-4 hidden flex-wrap gap-3 pb-3"></div>
                    <div class="flex items-end gap-1.5 p-2 rounded-[2.2rem] relative">
                        <div class="relative">
                            <button id="mainAttachBtn" class="w-11 h-11 flex items-center justify-center rounded-full text-gray-900 bg-white shadow-sm cursor-pointer hover:shadow-md transition-all">
                                <i class="fa-solid fa-plus text-lg"></i>
                            </button>
                            <div id="mainAttachMenu" class="glass hidden p-1.5 space-y-0.5 animate-pop" style="position: absolute; bottom: 65px; right: 0; width: 220px; z-index: 2000; border-radius: 2rem;">
                                <div id="optImage" class="p-2.5 hover:bg-white/50 rounded-2xl cursor-pointer flex items-center justify-between">
                                    <span class="text-xs font-bold text-gray-700">إرفاق صور</span>
                                    <div class="w-8 h-8 bg-blue-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-image text-blue-500 text-xs"></i></div>
                                </div>
                                <div id="optFile" class="p-2.5 hover:bg-white/50 rounded-2xl cursor-pointer flex items-center justify-between">
                                    <span class="text-xs font-bold text-gray-700">إرفاق ملفات</span>
                                    <div class="w-8 h-8 bg-purple-50 rounded-full flex items-center justify-center"><i class="fa-solid fa-paperclip text-purple-500 text-xs"></i></div>
                                </div>
                            </div>
                        </div>
                        <input type="file" id="imageInput" accept="image/*" class="hidden">
                        <input type="file" id="fileInput" class="hidden">
                        <textarea id="chatInput" rows="1" placeholder="اسأل Afnan ai..." class="flex-1 bg-transparent border-none focus:ring-0 py-4 px-3 text-[16px] resize-none max-h-40 hide-scrollbar" dir="auto"></textarea>
                        <button id="sendBtn" class="w-11 h-11 bg-black text-white rounded-full flex items-center justify-center active:scale-90 transition-all"><i class="fa-solid fa-arrow-up"></i></button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div id="logoutConfirm" class="hidden fixed inset-0 bg-black/40 z-[9999] items-center justify-center">
        <div class="glass p-8 rounded-3xl text-center max-w-xs w-full mx-4 shadow-2xl">
            <h3 class="text-xl font-bold mb-6">هل أنت متأكد من تسجيل الخروج؟</h3>
            <div class="flex gap-4">
                <button id="confirmYes" class="flex-1 bg-black text-white py-3 rounded-2xl font-bold">نعم</button>
                <button id="confirmNo" class="flex-1 bg-gray-100 text-gray-800 py-3 rounded-2xl font-bold">لا</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="script.js"></script>
</body>
</html>
