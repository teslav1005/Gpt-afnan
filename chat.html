<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>مصر الذكيه - استوديو النصوص والمحادثة</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root { --app-bg: #050505; --sheet-bg: #121214; --sidebar-bg: #0d0d0f; }
        body { font-family: 'Cairo', sans-serif; background-color: var(--app-bg); color: #fff; margin: 0; padding: 0; overflow: hidden; }
        .app-container { max-width: 480px; margin: 0 auto; height: 100dvh; background-color: var(--app-bg); display: flex; flex-direction: column; position: relative; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        #workspaceArea { flex: 1; overflow-y: auto; padding-bottom: 120px; }
        #floatingBottomSheet { position: absolute; bottom: 10px; left: 10px; right: 10px; background-color: var(--sheet-bg); border-radius: 24px; padding: 10px; box-shadow: 0 20px 50px rgba(0,0,0,0.9); z-index: 20; }
        textarea { resize: none; overflow-y: auto; min-height: 24px; max-height: 100px; line-height: 1.4; }
        #sidebarDrawer { position: absolute; top: 0; right: -100%; width: 75%; max-width: 320px; height: 100%; background-color: var(--sidebar-bg); z-index: 50; transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1); border-left: 1px solid rgba(255, 255, 255, 0.08); }
        #sidebarDrawer.open { right: 0; }
        #sidebarOverlay { position: absolute; inset: 0; background-color: rgba(0,0,0,0.6); z-index: 45; opacity: 0; pointer-events: none; transition: opacity 0.3s ease; }
        #sidebarOverlay.show { opacity: 1; pointer-events: auto; }
        .preview-slot { width: 50px; height: 50px; border-radius: 8px; background-size: cover; background-position: center; position: relative; border: 1px solid rgba(255,255,255,0.2); }
        .model-item { transition: all 0.2s ease; cursor: pointer; }
        .model-item:hover, .model-item.active { background-color: rgba(255, 255, 255, 0.08); }
        .fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
<div class="app-container">
    <div id="sidebarOverlay"></div>
    <div id="sidebarDrawer" class="flex flex-col justify-between p-4">
        <div class="flex flex-col h-[85%] space-y-4">
            <div class="flex justify-between items-center pb-2 border-b border-white/5">
                <span class="text-xs font-bold text-gray-400">القائمة الرئيسية</span>
                <button id="closeSidebarBtn" class="text-gray-400 hover:text-white w-7 h-7 flex items-center justify-center bg-zinc-900 rounded-full"><i class="fa-solid fa-xmark text-xs"></i></button>
            </div>
            <button id="sidebarNewChatBtn" class="w-full bg-white text-black hover:bg-gray-200 py-2.5 rounded-xl text-xs font-bold flex items-center justify-center gap-2 transition active:scale-95"><i class="fa-solid fa-plus text-xs"></i> محادثة جديدة</button>
            <div class="grid grid-cols-2 gap-2">
                <a href="Image.html" class="flex flex-col items-center justify-center p-3 rounded-xl bg-zinc-900/60 border border-white/5 hover:border-white/20 transition group"><i class="fa-regular fa-image text-lg text-gray-400 group-hover:text-white mb-1"></i><span class="text-[10px] font-bold text-gray-400 group-hover:text-white">توليد الصور</span></a>
                <a href="Video.html" class="flex flex-col items-center justify-center p-3 rounded-xl bg-zinc-900/60 border border-white/5 hover:border-white/20 transition group"><i class="fa-solid fa-clapperboard text-lg text-gray-400 group-hover:text-white mb-1"></i><span class="text-[10px] font-bold text-gray-400 group-hover:text-white">توليد الفيديو</span></a>
            </div>
            <div id="chatHistory" class="flex-1 overflow-y-auto no-scrollbar space-y-2 py-4"></div>
        </div>
        <div class="pt-4 border-t border-white/5 flex items-center gap-2.5">
            <div class="w-9 h-9 rounded-full bg-zinc-800 border border-white/20 flex items-center justify-center text-white font-bold text-xs">U</div>
            <div class="flex flex-col"><span class="text-xs font-bold text-white">الحساب الشخصي</span><span class="text-[9px] text-gray-500">مطور برمجيات</span></div>
            <i class="fa-solid fa-gear text-gray-500 text-xs mr-auto cursor-pointer hover:text-white"></i>
        </div>
    </div>
    
    <header class="z-30 backdrop-blur-md bg-black/40 sticky top-0 border-b border-white/5">
        <div class="flex justify-between items-center p-4">
            <button id="menuBtn" class="text-white hover:text-gray-300 w-9 h-9 flex items-center justify-center bg-zinc-900 rounded-full transition active:scale-90"><i class="fa-solid fa-bars text-sm"></i></button>
            <div id="modelTrigger" class="flex items-center gap-1.5 cursor-pointer text-xs font-bold text-gray-200 hover:text-white select-none py-1.5 px-3 rounded-full bg-zinc-900/40 border border-white/5 active:scale-95 transition">
                <span id="activeModelDisplay">DeepSeek V4 Pro</span><i id="dropdownArrow" class="fa-solid fa-chevron-down text-[9px] text-gray-400 transition-transform duration-200"></i>
            </div>
            <div class="flex items-center gap-1.5">
                <button id="headerNewChatBtn" class="text-gray-400 hover:text-white w-8 h-8 flex items-center justify-center bg-zinc-900/50 rounded-full transition"><i class="fa-solid fa-circle-plus text-xs"></i></button>
            </div>
        </div>
        <div id="modelsDropdown" class="hidden absolute top-full left-4 right-4 bg-[#141417]/95 backdrop-blur-lg border border-white/10 rounded-2xl p-2 mt-1.5 shadow-2xl z-50 max-h-[290px] overflow-y-auto no-scrollbar">
            <div class="space-y-1" id="dropdownModelsList">
                <div class="model-item active p-2.5 rounded-xl text-xs font-bold text-white" data-model="DeepSeek V4 Pro">DeepSeek V4 Pro</div>
                <div class="model-item p-2.5 rounded-xl text-xs font-semibold text-gray-400" data-model="Moonshot Kimi K2.7 Code">Moonshot Kimi K2.7 Code</div>
                <div class="model-item p-2.5 rounded-xl text-xs font-semibold text-gray-400" data-model="GPT-5.4">GPT-5.4</div>
                <div class="model-item p-2.5 rounded-xl text-xs font-semibold text-gray-400" data-model="Gemini 3.1 Pro">Gemini 3.1 Pro</div>
                <div class="model-item p-2.5 rounded-xl text-xs font-semibold text-gray-400" data-model="Claude Sonnet 4.6">Claude Sonnet 4.6</div>
            </div>
        </div>
    </header>

    <main id="workspaceArea" class="p-4 no-scrollbar">
        <div id="welcomeSection" class="flex flex-col items-center justify-center text-center py-16 px-4 space-y-3">
            <div class="w-12 h-12 rounded-2xl bg-zinc-900 border border-white/10 flex items-center justify-center text-xl text-white"><i class="fa-regular fa-comment-dots"></i></div>
            <h2 class="text-sm font-bold text-white">استوديو الدردشة الذكي</h2>
            <p class="text-[11px] text-gray-500 max-w-[280px] leading-relaxed">النموذج النشط حالياً: <span id="welcomeModelDisplay" class="text-white font-bold">DeepSeek V4 Pro</span></p>
        </div>
        <div id="chatSection" class="hidden space-y-4 mt-2"></div>
    </main>

    <div id="floatingBottomSheet" class="flex flex-col gap-2">
        <div id="attachmentPreviewArea" class="hidden flex gap-2 overflow-x-auto no-scrollbar pb-1 px-1 border-b border-white/5 mb-1"></div>
        <div class="flex items-end gap-2 bg-[#1C1C1E] p-1.5 pl-2 rounded-full border border-gray-700/50 focus-within:border-gray-500 transition-colors relative">
            <button id="attachBtn" class="w-9 h-9 flex items-center justify-center text-gray-400 hover:text-white rounded-full transition flex-shrink-0 bg-gray-800/40 active:scale-90"><i class="fa-solid fa-plus text-sm"></i></button>
            <textarea id="promptInput" rows="1" class="bg-transparent w-full outline-none text-xs py-2 text-white placeholder-gray-500" placeholder="اسأل أو اكتب ما تريد هنا..."></textarea>
            <button id="sendBtn" class="bg-white text-black rounded-full w-9 h-9 flex-shrink-0 flex items-center justify-center opacity-40 transition-all duration-300 pointer-events-none"><i class="fa-solid fa-paper-plane text-xs translate-x-[-1px] translate-y-[1px]"></i></button>
        </div>
    </div>
</div>
<input type="file" id="hiddenFileInput" accept="image/*" class="hidden" multiple>

<script>
    let currentMessages = [];
    let attachedFiles = [];
    let currentChatId = Date.now().toString();
    let selectedModel = "DeepSeek V4 Pro";

    const promptInput = document.getElementById('promptInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatSection = document.getElementById('chatSection');
    const welcomeSection = document.getElementById('welcomeSection');
    const hiddenFileInput = document.getElementById('hiddenFileInput');
    const attachmentPreviewArea = document.getElementById('attachmentPreviewArea');

    // --- Sidebar & UI ---
    document.getElementById('menuBtn').onclick = () => { document.getElementById('sidebarDrawer').classList.add('open'); document.getElementById('sidebarOverlay').classList.add('show'); };
    document.getElementById('closeSidebarBtn').onclick = () => { document.getElementById('sidebarDrawer').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); };
    document.getElementById('sidebarOverlay').onclick = () => { document.getElementById('sidebarDrawer').classList.remove('open'); document.getElementById('sidebarOverlay').classList.remove('show'); };
    
    document.getElementById('modelTrigger').onclick = () => {
        const dropdown = document.getElementById('modelsDropdown');
        dropdown.classList.toggle('hidden');
        document.getElementById('dropdownArrow').classList.toggle('rotate-180');
    };

    document.querySelectorAll('.model-item').forEach(item => {
        item.onclick = () => {
            selectedModel = item.dataset.model;
            document.getElementById('activeModelDisplay').textContent = selectedModel;
            document.getElementById('welcomeModelDisplay').textContent = selectedModel;
            document.querySelectorAll('.model-item').forEach(i => i.classList.remove('active', 'text-white'));
            item.classList.add('active', 'text-white');
            document.getElementById('modelsDropdown').classList.add('hidden');
            document.getElementById('dropdownArrow').classList.remove('rotate-180');
        };
    });

    // --- Files ---
    document.getElementById('attachBtn').onclick = () => hiddenFileInput.click();
    hiddenFileInput.onchange = (e) => {
        Array.from(e.target.files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (ev) => {
                attachedFiles.push({ name: file.name, type: file.type, data: ev.target.result });
                renderPreviews();
            };
            reader.readAsDataURL(file);
        });
    };

    function renderPreviews() {
        attachmentPreviewArea.innerHTML = '';
        if (attachedFiles.length > 0) attachmentPreviewArea.classList.remove('hidden');
        else attachmentPreviewArea.classList.add('hidden');
        attachedFiles.forEach((f, i) => {
            const div = document.createElement('div');
            div.className = "preview-slot flex-shrink-0";
            div.style.backgroundImage = `url(${f.data})`;
            div.innerHTML = `<button class="absolute -top-1 -right-1 bg-black rounded-full w-4 h-4 text-[10px]" onclick="removeFile(${i})">×</button>`;
            attachmentPreviewArea.appendChild(div);
        });
    }
    window.removeFile = (i) => { attachedFiles.splice(i, 1); renderPreviews(); };

    // --- Chat Logic ---
    promptInput.oninput = () => {
        promptInput.style.height = 'auto';
        promptInput.style.height = promptInput.scrollHeight + 'px';
        if (promptInput.value.trim() || attachedFiles.length > 0) {
            sendBtn.classList.remove('opacity-40', 'pointer-events-none');
        } else {
            sendBtn.classList.add('opacity-40', 'pointer-events-none');
        }
    };

    sendBtn.onclick = async () => {
        const text = promptInput.value.trim();
        if (!text && attachedFiles.length === 0) return;

        welcomeSection.classList.add('hidden');
        chatSection.classList.remove('hidden');
        
        appendMessage('user', text, [...attachedFiles]);
        const userMsg = { role: 'user', content: [] };
        if (text) userMsg.content.push({ type: 'text', text: text });
        attachedFiles.forEach(f => {
            if (f.type.startsWith('image/')) userMsg.content.push({ type: 'image_url', image_url: { url: f.data } });
        });
        currentMessages.push(userMsg);

        promptInput.value = '';
        promptInput.style.height = 'auto';
        attachedFiles = [];
        renderPreviews();
        sendBtn.classList.add('opacity-40', 'pointer-events-none');

        const loading = appendLoading();

        try {
            const res = await fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ messages: currentMessages, model: selectedModel })
            });
            const data = await res.json();
            loading.remove();
            const reply = data.choices[0].message.content;
            appendMessage('bot', reply);
            currentMessages.push({ role: 'assistant', content: reply });
            saveChat();
        } catch (e) {
            loading.remove();
            appendMessage('bot', "حدث خطأ في الاتصال بالخادم.");
        }
    };

    function appendMessage(sender, text, files = []) {
        const div = document.createElement('div');
        div.className = `flex ${sender === 'user' ? 'justify-end' : 'justify-start'} fade-in`;
        let content = '';
        if (files.length > 0) {
            files.forEach(f => content += `<img src="${f.data}" class="max-w-[200px] rounded-lg mb-2">`);
        }
        content += `<div class="${sender === 'user' ? 'bg-white text-black' : 'bg-zinc-900 border border-white/5'} p-3 rounded-2xl text-xs max-w-[85%] leading-relaxed">${text}</div>`;
        div.innerHTML = content;
        chatSection.appendChild(div);
        document.getElementById('workspaceArea').scrollTop = document.getElementById('workspaceArea').scrollHeight;
    }

    function appendLoading() {
        const div = document.createElement('div');
        div.className = "flex justify-start fade-in";
        div.innerHTML = `<div class="bg-zinc-900 p-3 rounded-2xl text-xs text-gray-400"><i class="fa-solid fa-spinner fa-spin"></i> جاري التفكير...</div>`;
        chatSection.appendChild(div);
        return div;
    }

    function saveChat() {
        const chats = JSON.parse(localStorage.getItem('afnan_chats_v2') || '{}');
        chats[currentChatId] = { title: currentMessages[0].content[0]?.text || "محادثة جديدة", messages: currentMessages };
        localStorage.setItem('afnan_chats_v2', JSON.stringify(chats));
        renderHistory();
    }

    function renderHistory() {
        const history = document.getElementById('chatHistory');
        history.innerHTML = '';
        const chats = JSON.parse(localStorage.getItem('afnan_chats_v2') || '{}');
        Object.keys(chats).reverse().forEach(id => {
            const div = document.createElement('div');
            div.className = "p-2 bg-zinc-900/40 rounded-lg text-[10px] text-gray-400 cursor-pointer hover:bg-zinc-800 transition truncate";
            div.textContent = chats[id].title;
            div.onclick = () => loadChat(id);
            history.appendChild(div);
        });
    }

    function loadChat(id) {
        const chats = JSON.parse(localStorage.getItem('afnan_chats_v2') || '{}');
        currentChatId = id;
        currentMessages = chats[id].messages;
        chatSection.innerHTML = '';
        welcomeSection.classList.add('hidden');
        chatSection.classList.remove('hidden');
        currentMessages.forEach(m => {
            const text = typeof m.content === 'string' ? m.content : m.content.find(c => c.type === 'text')?.text || '';
            const imgs = Array.isArray(m.content) ? m.content.filter(c => c.type === 'image_url').map(c => ({ data: c.image_url.url })) : [];
            appendMessage(m.role === 'user' ? 'user' : 'bot', text, imgs);
        });
        document.getElementById('sidebarDrawer').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');
    }

    document.getElementById('sidebarNewChatBtn').onclick = document.getElementById('headerNewChatBtn').onclick = () => {
        currentChatId = Date.now().toString();
        currentMessages = [];
        chatSection.innerHTML = '';
        welcomeSection.classList.remove('hidden');
        chatSection.classList.add('hidden');
        document.getElementById('sidebarDrawer').classList.remove('open');
        document.getElementById('sidebarOverlay').classList.remove('show');
    };

    renderHistory();
</script>
</body>
</html>
